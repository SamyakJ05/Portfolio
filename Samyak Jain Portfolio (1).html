tainIQ<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ── About ─────────────────────────────────────────────────────── -->\n  <section id=\"about\">\n    <div class=\"section-label\">About<\u002Fdiv>\n    <p class=\"about-bio\">\n      I'm a Software Engineer at UBS Pune building cloud-native data architecture and post-trade systems on Azure —\n      while simultaneously pursuing a PGDM in Finance from XLRI Jamshedpur.\n      Outside work, I'm deep in the AI builder ecosystem: automating workflows with n8n, prototyping with LangChain,\n      and shipping products fast with AI IDEs — because the best way to understand a tool is to build something real with it.\n    <\u002Fp>\n\n    <div class=\"tools-label\">Tools I Use &amp; Explore<\u002Fdiv>\n    <div class=\"pills-grid\">\n      <span class=\"pill\">Java<\u002Fspan>\n      <span class=\"pill\">Kotlin<\u002Fspan>\n      <span class=\"pill\">Python<\u002Fspan>\n      <span class=\"pill\">Spring Boot<\u002Fspan>\n      <span class=\"pill\">Azure<\u002Fspan>\n      <span class=\"pill\">Terraform<\u002Fspan>\n      <span class=\"pill\">Docker<\u002Fspan>\n      <span class=\"pill\">Kubernetes<\u002Fspan>\n      <span class=\"pill\">Kafka<\u002Fspan>\n      <span class=\"pill\">MongoDB<\u002Fspan>\n      <span class=\"pill\">Databricks<\u002Fspan>\n      <span class=\"pill\">LangChain<\u002Fspan>\n      <span class=\"pill\">n8n<\u002Fspan>\n      <span class=\"pill\">LLMs<\u002Fspan>\n      <span class=\"pill\">GitLab CI/CD<\u002Fspan>\n      <span class=\"pill\">Azure OpenAI<\u002Fspan>\n      <span class=\"pill\">Cursor<\u002Fspan>\n      <span class=\"pill\">Windsurf<\u002Fspan>\n      <span class=\"pill\">Claude<\u002Fspan>\n      <span class=\"pill\">React.js<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ── Experience ─────────────────────────────────────────────────── -->\n  <section id=\"experience\">\n    <div class=\"section-label\">Experience<\u002Fdiv>\n    <div class=\"section-title\">Where I've Worked<\u002Fdiv>\n\n    <div class=\"timeline\">\n      <div class=\"timeline-line\"><\u002Fdiv>\n\n      <!-- UBS Full-time -->\n      <div class=\"timeline-entry\">\n        <div class=\"timeline-dot\"><\u002Fdiv>\n        <div class=\"entry-header\">\n          <div class=\"entry-company\">UBS<\u002Fdiv>\n          <div class=\"entry-role\">Software Engineer<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"entry-meta\">Aug 2024 – Present &nbsp;·&nbsp; Pune, India<\u002Fdiv>\n        <ul class=\"entry-bullets\">\n          <li>Building a cloud-native data mesh architecture on Azure; developing Java and Kotlin/Spring Boot microservices for scalable data and report generation for post-trade activities.<\u002Fli>\n          <li>Automated deployments with GitLab CI/CD pipelines, reducing manual effort by 50%.<\u002Fli>\n          <li>Developed Terraform and Ansible templates to provision 100+ Azure resources, reducing environment setup time by 80%.<\u002Fli>\n          <li>Implemented IAM-based authentication per banking security standards; enhanced reliability with Splunk and BigPanda monitoring.<\u002Fli>\n          <li>Currently building internal tools using spec-driven AI development, improving team efficiency by 50%+.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- UBS Intern -->\n      <div class=\"timeline-entry\">\n        <div class=\"timeline-dot\"><\u002Fdiv>\n        <div class=\"entry-header\">\n          <div class=\"entry-company\">UBS<\u002Fdiv>\n          <div class=\"entry-role\">Software Engineer Intern<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"entry-meta\">Jan 2024 – Aug 2024 &nbsp;·&nbsp; Pune, India<\u002Fdiv>\n        <ul class=\"entry-bullets\">\n          <li>Built microservices integrated with Azure OpenAI, Azure Search, and Databricks for intelligent document retrieval and summarization.<\u002Fli>\n          <li>Optimized data storage via ADLS Gen2, achieving 50% reduction in storage costs.<\u002Fli>\n          <li>Prototyped AI-powered data access solutions as groundwork for the enterprise cloud AI and data mesh strategy.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- Ford Pro -->\n      <div class=\"timeline-entry\">\n        <div class=\"timeline-dot\"><\u002Fdiv>\n        <div class=\"entry-header\">\n          <div class=\"entry-company\">Ford Pro<\u002Fdiv>\n          <div class=\"entry-role\">Software Engineer Intern<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"entry-meta\">Jun 2023 – Dec 2023 &nbsp;·&nbsp; Bengaluru, India<\u002Fdiv>\n        <ul class=\"entry-bullets\">\n          <li>Worked with Large Language Models to develop internal tools for streamlining bug resolution workflows.<\u002Fli>\n          <li>Automated the bug reporting process; trained and deployed a conversational chatbot for internal application support.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- ICAR -->\n      <div class=\"timeline-entry\">\n        <div class=\"timeline-dot\"><\u002Fdiv>\n        <div class=\"entry-header\">\n          <div class=\"entry-company\">ICAR – NIAP<\u002Fdiv>\n          <div class=\"entry-role\">ML &amp; Android Intern<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"entry-meta\">Jun 2022 – Aug 2022 &nbsp;·&nbsp; Delhi, India<\u002Fdiv>\n        <ul class=\"entry-bullets\">\n          <li>Trained a Machine Learning model using Keras and TensorFlow to detect wheat plant diseases.<\u002Fli>\n          <li>Built a user-friendly Android app integrating the ML model for field use.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ── Accomplishments ─────────────────────────────────────────────── -->\n  <section id=\"accomplishments\">\n    <div class=\"section-label\">Recognition<\u002Fdiv>\n    <div class=\"section-title\">Awards &amp; Accomplishments<\u002Fdiv>\n\n    <div class=\"acc-grid\">\n      <div class=\"acc-card\">\n        <span class=\"acc-icon\" rticles<\u002Fbutton>\n    <button class=\"tweak-opt\" data-anim=\"constellation\" style=\"padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:0.75rem;cursor:none;transition:border-color 0.2s,background 0.2s;\">Constellation<\u002Fbutton>\n    <button class=\"tweak-opt\" data-anim=\"aurora\" style=\"padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:0.75rem;cursor:none;transition:border-color 0.2s,background 0.2s;\">Aurora<\u002Fbutton>\n    <button class=\"tweak-opt\" data-anim=\"matrix\" style=\"padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:0.75rem;cursor:none;transition:border-color 0.2s,background 0.2s;\">Matrix<\u002Fbutton>\n    <button class=\"tweak-opt\" data-anim=\"none\" style=\"padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:0.75rem;cursor:none;grid-column:span 2;transition:border-color 0.2s,background 0.2s;\">None (dot grid)<\u002Fbutton>\n  <\u002Fdiv>\n\n  <label style=\"font-size:0.78rem;color:var(--muted);display:block;margin-bottom:6px;\">Accent Color<\u002Flabel>\n  <div style=\"display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;\">\n    <button class=\"color-swatch\" data-color=\"#4f98a3\" style=\"width:28px;height:28px;border-radius:50%;background:#4f98a3;border:2px solid transparent;cursor:none;\" title=\"Teal\"><\u002Fbutton>\n    <button class=\"color-swatch\" data-color=\"#3b82f6\" style=\"width:28px;height:28px;border-radius:50%;background:#3b82f6;border:2px solid transparent;cursor:none;\" title=\"Blue\"><\u002Fbutton>\n    <button class=\"color-swatch\" data-color=\"#a78bfa\" style=\"width:28px;height:28px;border-radius:50%;background:#a78bfa;border:2px solid transparent;cursor:none;\" title=\"Violet\"><\u002Fbutton>\n    <button class=\"color-swatch\" data-color=\"#f59e0b\" style=\"width:28px;height:28px;border-radius:50%;background:#f59e0b;border:2px solid transparent;cursor:none;\" title=\"Amber\"><\u002Fbutton>\n    <button class=\"color-swatch\" data-color=\"#10b981\" style=\"width:28px;height:28px;border-radius:50%;background:#10b981;border:2px solid transparent;cursor:none;\" title=\"Emerald\"><\u002Fbutton>\n  <\u002Fdiv>\n\n  <label style=\"font-size:0.78rem;color:var(--muted);display:block;margin-bottom:4px;\">Intensity <span id=\"intensity-val\" style=\"color:var(--text)\">50<\u002Fspan><\u002Flabel>\n  <input id=\"intensity-slider\" type=\"range\" min=\"10\" max=\"100\" value=\"50\" style=\"width:100%;accent-color:var(--accent);margin-bottom:4px;\">\n<\u002Fdiv>\n\n<script>\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"animStyle\": \"aurora\",\n  \"accentColor\": \"#a78bfa\",\n  \"intensity\": 10\n}/*EDITMODE-END*/;\n\n// ── Tweaks protocol ──────────────────────────────────────────────────\nconst panel = document.getElementById('tweaks-panel');\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') panel.style.display = 'block';\n  if (e.data?.type === '__deactivate_edit_mode') panel.style.display = 'none';\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\nlet tweaks = { ...TWEAK_DEFAULTS };\n\nfunction applyTweaks() {\n  document.documentElement.style.setProperty('--accent', tweaks.accentColor);\n  document.documentElement.style.setProperty('--accent-dim', tweaks.accentColor + '22');\n  setAnim(tweaks.animStyle);\n  document.getElementById('intensity-val').textContent = tweaks.intensity;\n  document.getElementById('intensity-slider').value = tweaks.intensity;\n  // highlight active anim btn\n  document.querySelectorAll('.tweak-opt').forEach(b => {\n    const active = b.dataset.anim === tweaks.animStyle;\n    b.style.borderColor = active ? 'var(--accent)' : 'var(--border)';\n    b.style.background = active ? 'var(--accent-dim)' : 'var(--bg3)';\n    b.style.color = active ? 'var(--text)' : 'var(--muted)';\n  });\n  // highlight active color\n  document.querySelectorAll('.color-swatch').forEach(b => {\n    b.style.borderColor = b.dataset.color === tweaks.accentColor ? 'var(--text)' : 'transparent';\n  });\n}\n\ndocument.querySelectorAll('.tweak-opt').forEach(btn => {\n  btn.addEventListener('click', () => {\n    tweaks.animStyle = btn.dataset.anim;\n    applyTweaks();\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { animStyle: tweaks.animStyle } }, '*');\n  });\n});\ndocument.querySelectorAll('.color-swatch').forEach(btn => {\n  btn.addEventListener('click', () => {\n    tweaks.accentColor = btn.dataset.color;\n    applyTweaks();\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: tweaks.accentColor } }, '*');\n  });\n});\ndocument.getElementById('intensity-slider').addEventListener('input', e => {\n  tweaks.intensity = +e.target.value;\n  applyTweaks();\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { intensity: tweaks.intensity } }, '*');\n});\n\n// ── Background Animations ────────────────────────────────────────────\nconst canvas = document.getElementById('bg-canvas');\nconst ctx = canvas.getContext('2d');\nlet animFrame, currentAnim = null;\n\nfunction resize() {\n  canvas.width = window.innerWidth;\n  canvas.height = window.innerHeight;\n}\nwindow.addEventListener('resize', resize);\nresize();\n\nfunction hexToRgb(hex) {\n  const r = parseInt(hex.slice(1,3),16);\n  const g = parseInt(hex.slice(3,5),16);\n  const b = parseInt(hex.slice(5,7),16);\n  return `${r},${g},${b}`;\n}\n\n// --- Particles ---\nfunction runParticles() {\n  const count = Math.round(tweaks.intensity * 0.8);\n  const pts = Array.from({length: count}, () => ({\n    x: Math.random() * canvas.width,\n    y: Math.random() * canvas.height,\n    vx: (Math.random() - 0.5) * 0.4,\n    vy: (Math.random() - 0.5) * 0.4,\n    r: Math.random() * 2 + 1\n  }));\n  function draw() {\n    ctx.clearRect(0,0,canvas.width,canvas.height);\n    const rgb = hexToRgb(tweaks.accentColor);\n    pts.forEach(p => {\n      p.x += p.vx; p.y += p.vy;\n      if (p.x < 0) p.x = canvas.width;\n      if (p.x > canvas.width) p.x = 0;\n      if (p.y < 0) p.y = canvas.height;\n      if (p.y > canvas.height) p.y = 0;\n      ctx.beginPath();\n      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);\n      ctx.fillStyle = `rgba(${rgb},0.5)`;\n      ctx.fill();\n    });\n    animFrame = requestAnimationFrame(draw);\n  }\n  draw();\n}\n\n// --- Constellation ---\nfunction runConstellation() {\n  const count = Math.round(tweaks.intensity * 0.6);\n  const pts = Array.from({length: count}, () => ({\n    x: Math.random() * canvas.width,\n    y: Math.random() * canvas.height,\n    vx: (Math.random() - 0.5) * 0.3,\n    vy: (Math.random() - 0.5) * 0.3,\n  }));\n  const maxDist = 140;\n  function draw() {\n    ctx.clearRect(0,0,canvas.width,canvas.height);\n    const rgb = hexToRgb(tweaks.accentColor);\n    pts.forEach(p => {\n      p.x += p.vx; p.y += p.vy;\n      if (p.x < 0) p.x = canvas.width;\n      if (p.x > canvas.width) p.x = 0;\n      if (p.y < 0) p.y = canvas.height;\n      if (p.y > canvas.height) p.y = 0;\n    });\n    for (let i = 0; i < pts.length; i++) {\n      for (let j = i+1; j < pts.length; j++) {\n        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;\n        const d = Math.sqrt(dx*dx+dy*dy);\n        if (d < maxDist) {\n          ctx.beginPath();\n          ctx.moveTo(pts[i].x, pts[i].y);\n          ctx.lineTo(pts[j].x, pts[j].y);\n          ctx.strokeStyle = `rgba(${rgb},${(1 - d/maxDist) * 0.25})`;\n          ctx.lineWidth = 0.8;\n          ctx.stroke();\n        }\n      }\n    }\n    pts.forEach(p => {\n      ctx.beginPath();\n      ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);\n      ctx.fillStyle = `rgba(${rgb},0.6)`;\n      ctx.fill();\n    });\n    animFrame = requestAnimationFrame(draw);\n  }\n  draw();\n}\n\n// --- Aurora ---\nfunction runAurora() {\n  let t = 0;\n  const speed = tweaks.intensity / 2000;\n  function draw() {\n    t += speed;\n    ctx.clearRect(0,0,canvas.width,canvas.height);\n    const rgb = hexToRgb(tweaks.accentColor);\n    const waves = 3;\n    for (let w = 0; w < waves; w++) {\n      const offset = (w / waves) * Math.PI * 2;\n      const grad = ctx.createLinearGradient(0, canvas.height*0.2, canvas.width, canvas.height*0.8);\n      const alpha = 0.04 + w*0.02;\n      grad.addColorStop(0, `rgba(${rgb},0)`);\n      grad.addColorStop(0.3 + 0.2*Math.sin(t+offset), `rgba(${rgb},${alpha})`);\n      grad.addColorStop(0.7 + 0.15*Math.cos(t*1.3+offset), `rgba(${rgb},${alpha*0.5})`);\n      grad.addColorStop(1, `rgba(${rgb},0)`);\n      ctx.beginPath();\n      ctx.moveTo(0, canvas.height*0.5);\n      for (let x = 0; x <= canvas.width; x += 4) {\n        const y = canvas.height*(0.35 + 0.15*Math.sin(x/canvas.width*Math.PI*2 + t + offset)\n          + 0.08*Math.cos(x/canvas.width*Math.PI*3 + t*1.5));\n        ctx.lineTo(x, y);\n      }\n      ctx.lineTo(canvas.width, canvas.height);\n      ctx.lineTo(0, canvas.height);\n      ctx.closePath();\n      ctx.fillStyle = grad;\n      ctx.fill();\n    }\n    animFrame = requestAnimationFrame(draw);\n  }\n  draw();\n}\n\n// --- Matrix ---\nfunction runMatrix() {\n  const cols = Math.floor(canvas.width / 20);\n  const drops = Array(cols).fill(0).map(() => Math.random() * -50);\n  const chars = '01アイウエオカキクケコサシスセソ';\n  const speed = tweaks.intensity / 800;\n  function draw() {\n    const rgb = hexToRgb(tweaks.accentColor);\n    ctx.fillStyle = 'rgba(13,13,13,0.05)';\n    ctx.fillRect(0,0,canvas.width,canvas.height);\n    ctx.font = '13px monospace';\n    drops.forEach((y, i) => {\n      const ch = chars[Math.floor(Math.random()*chars.length)];\n      const bright = Math.random() > 0.95;\n      ctx.fillStyle = bright ? `rgba(255,255,255,0.9)` : `rgba(${rgb},0.45)`;\n      ctx.fillText(ch, i*20, y*20);\n      if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;\n      drops[i] += speed;\n    });\n    animFrame = requestAnimationFrame(draw);\n  }\n  draw();\n}\n\nfunction setAnim(style) {\n  cancelAnimationFrame(animFrame);\n  ctx.clearRect(0,0,canvas.width,canvas.height);\n  currentAnim = style;\n  if (style === 'none') {\n    canvas.style.opacity = '0';\n    document.getElementById('dot-grid').classList.add('visible');\n    return;\n  }\n  document.getElementById('dot-grid').classList.remove('visible');\n  canvas.style.opacity = '1';\n  if (style === 'particles') runParticles();\n  else if (style === 'constellation') runConstellation();\n  else if (style === 'aurora') runAurora();\n  else if (style === 'matrix') runMatrix();\n}\n\n// Apply defaults after page loads\nconst animCycle = ['constellation', 'particles', 'aurora', 'matrix'];\nwindow.addEventListener('load', () => {\n  applyTweaks();\n  // Cycle through animations on each load\n  const lastIdx = parseInt(localStorage.getItem('sj_anim_idx') ?? '-1');\n  const nextIdx = (lastIdx + 1) % animCycle.length;\n  localStorage.setItem('sj_anim_idx', nextIdx);\n  const cycleAnim = animCycle[nextIdx];\n  tweaks.animStyle = cycleAnim;\n  document.querySelectorAll('.tweak-opt').forEach(b => {\n    const active = b.dataset.anim === cycleAnim;\n    b.style.borderColor = active ? 'var(--accent)' : 'var(--border)';\n    b.style.background = active ? 'var(--accent-dim)' : 'var(--bg3)';\n    b.style.color = active ? 'var(--text)' : 'var(--muted)';\n  });\n  setTimeout(() => setAnim(cycleAnim), 1200);\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
